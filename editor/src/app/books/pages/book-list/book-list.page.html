<div class="grid grid-nogutter surface-section mx-6">
  <div class="col-12 p-4 flex flex-column relative">
    <span class="watermark text-primary">
      <i class="fas fa-book"></i>
    </span>
    <div class="border-none border-bottom-3 border-primary">
      <app-list-table name="books"
                      recordsLabel="Libros"
                      borderColor="border-primary"
                      [breadcrumb]="breadcrumb"
                      [service]="service"
                      [columns]="columns"
                      [adapter]="adapter"
                      (itemClicked)="onClick($event)">
        <p-button (click)="onCreate()" size="small">
          <fa-icon class="mr-2" icon="plus"></fa-icon>
          <span>Nuevo Libro</span>
        </p-button>
      </app-list-table>
    </div>
  </div>
</div>
