<div class="grid grid-nogutter surface-section mx-6">
  <div class="col-12 p-4 flex flex-column relative">
    <span class="watermark text-orange-600">
      <i class="fas fa-people-group"></i>
    </span>
    <div class="border-none border-bottom-3 border-orange-600">
      <app-list-table name="customers"
                      recordsLabel="Clientes"
                      borderColor="border-orange-600"
                      [breadcrumb]="breadcrumb"
                      [service]="service"
                      [columns]="columns"
                      [adapter]="adapter"
                      [formatter]="formatter"
                      [stylable]="stylable"
                      (itemClicked)="onClick($event)">
        <p-button (click)="onCreate()" size="small">
          <fa-icon class="mr-2" icon="person-circle-plus"></fa-icon>
          <span>Nuevo Cliente</span>
        </p-button>
      </app-list-table>
    </div>
  </div>
</div>
